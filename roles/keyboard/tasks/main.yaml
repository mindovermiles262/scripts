---
- name: Load XOrg Key Remap file
  become: yes
  become_method: sudo
  ansible.builtin.copy:
    src: "{{ role_path }}/files/pc"
    dest: "/usr/share/X11/xkb/symbols/pc"
    owner: root
    group: root
    mode: '0644'
  

setw -g mode-keys vi
set -g prefix ^g

# Reload tmux.conf
bind r source-file ~/.tmux.conf \; display "Tmux Conf Reloaded"

set -g history-limit 50000

bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind N break-pane

set -g status-left-length 40
set -g status-left " [#S] | "
set -g status-right "%a %b %d %R"

# Window styles, Deriviatives of color23/#005454
set -g window-active-style bg=#002222
set -g window-style bg=#000808
set -gu status-bg
set -gu status-fg
# set -g status-style bg=colour240,fg=colour3
set -g status-style bg=#005454,fg=#80aaaa
setw -gu window-status-current-style
# set-window-option -g window-status-current-style fg=colour39,bold
set-window-option -g window-status-current-style fg=#E6EEEE,bold

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Vim style pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Set window name as dirname
set -g status-interval 1
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Set tab count at '1'
set -g base-index 1
setw -g pane-base-index 1

# Relabel tab counts when closed
set -g renumber-windows on

# New window opens in same dir
bind c new-window -c "#{pane_current_path}"

# Reorder windows using Ctrl+Shift+Left/Right
bind -n C-S-Left { swap-window -t -1; previous-window }
bind -n C-S-Right { swap-window -t +1; next-window }

# Add mouse support
set -g mouse on

# Fix vim airline:
# https://github.com/vim-airline/vim-airline/issues/829
# setw -q -g utf8 on
# set -g default-terminal "screen-256color"

# Load MacOS Specific Bindings
if-shell "uname | grep -q Darwin" "source-file ~/.tmux.macos"
if-shell "uname | grep -q Linux" "source-file ~/.tmux.linux"

# Tmux Logging Plugin
set -g @logging-path "$HOME/.tmux_logs"
set -g @screen-capture-path "$HOME/.tmux_logs"
set -g @save-complete-history-path "$HOME/.tmux_logs"

run-shell ~/.tmux/plugins/tmux-logging/logging.tmux

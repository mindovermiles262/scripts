---
- name: Install tmux - Linux
  when: ansible_facts.system in ["Linux"]
  become: yes
  become_method: sudo
  with_items:
    - tmux
    - xclip
  package:
    name: "{{ item }}"
    state: latest

- name: Install tmux - MacOS
  when: ansible_facts.distribution == "MacOSX"
  homebrew:
    name: tmux
    state: present
    update_homebrew: yes

- name: Symlink main tmux config
  file:
    src: "{{ role_path }}/files/tmux.conf"
    dest: "{{ ansible_facts.user_dir }}/.tmux.conf"
    owner: "{{ ansible_facts.user_id }}"
    group: " {{ ansible_facts.user_gid }}"
    state: link
    force: yes

- name: Symlink tmux Config - MacOS
  when: ansible_facts.distribution == "MacOSX"
  file:
    src: "{{ role_path }}/files/tmux.macos"
    dest: "{{ ansible_facts.user_dir }}/.tmux.macos"
    owner: "{{ ansible_facts.user_id }}"
    group: " {{ ansible_facts.user_gid }}"
    state: link
    force: yes

- name: Symlink tmux Config - Linux
  when: ansible_facts.system in ["Linux"]
  file:
    src: "{{ role_path }}/files/tmux.linux"
    dest: "{{ ansible_facts.user_dir }}/.tmux.linux"
    owner: "{{ ansible_facts.user_id }}"
    group: " {{ ansible_facts.user_gid }}"
    state: link
    force: yes

- name: Create Tmux Plugin Directory
  ansible.builtin.file:
    path: "{{ ansible_facts.user_dir }}/.tmux/plugins"
    state: directory

- name: Install Tmux Logging Plugin
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tmux-logging.git
    dest: "{{ ansible_facts.user_dir }}/.tmux/plugins/tmux-logging"

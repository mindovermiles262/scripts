- name: Install Syncthing - Linux
  when: ansible_facts.system in ["Linux"]
  become: yes
  become_method: sudo
  package:
    name: syncthing
    state: latest
    update_cache: true

- name: Configure Syncthing Systemd
  when: ansible_facts.system in ["Linux"]
  become: yes
  become_method: sudo
  ansible.builtin.copy:
    src: "{{ role_path }}/files/syncthing.service"
    dest: "/etc/systemd/system/syncthing@.service"

- name: Start, Enable Syncthing Systemd User Service
  when: ansible_facts.system in ["Linux"]
  ansible.builtin.systemd_service:
    name: syncthing
    daemon_reload: true
    enabled: true
    state: started
    scope: user
